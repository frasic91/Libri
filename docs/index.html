<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libreria App</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<style>
body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; display:flex; justify-content:center; align-items:flex-start; padding:20px;}
.glass-card { backdrop-filter: blur(15px); background: rgba(255,255,255,0.15); border-radius: 20px; padding:20px; color:white; box-shadow:0 8px 32px rgba(0,0,0,0.3);}
input, select, textarea { background: rgba(255,255,255,0.2) !important; border:none !important; color:white !important;}
input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.7);}
textarea { resize:none; height:80px; }
.btn-custom { border-radius:30px; font-weight:600; margin-top:5px;}
#reader_add { width:100%; margin-top:10px;}
.book-item { background: rgba(255,255,255,0.1); padding:10px; border-radius:10px; margin-bottom:8px; cursor:grab; display:flex; justify-content:space-between; align-items:center;}
.book-item span { flex:1; }
.book-item button { margin-left:10px; border-radius:10px; border:none;}
.columns { display:flex; gap:15px; justify-content:center; margin-top:20px; width:100%;}
.column { flex:1; min-width:200px; background: rgba(255,255,255,0.1); border-radius:15px; padding:10px; min-height:300px;}
.column h5 { text-align:center; margin-bottom:10px;}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authCard" class="glass-card text-center" style="width:400px;">
  <h3 class="mb-4 fw-bold">📚 Libreria App</h3>
  <div class="mb-3">
    <span id="loginTab" class="tab-btn active-tab">Login</span>
    <span id="registerTab" class="tab-btn">Registrati</span>
  </div>
  <input type="text" id="nome" class="form-control mb-3 d-none" placeholder="Nome">
  <select id="genere" class="form-control mb-3 d-none">
    <option value="">Seleziona genere</option>
    <option value="M">Uomo</option>
    <option value="F">Donna</option>
  </select>
  <input type="email" id="email" class="form-control mb-3" placeholder="Email">
  <input type="password" id="password" class="form-control mb-3" placeholder="Password">
  <button id="mainButton" class="btn btn-light btn-custom w-100 mb-2">Accedi</button>
  <div class="mt-2">
    <small style="cursor:pointer;" id="forgotPassword">Password dimenticata?</small>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="glass-card text-center d-none" style="width:400px;">
  <h3 class="fw-bold mb-3">🔒 Benvenuto <span id="welcomeName"></span> 👋</h3>
  <button id="addBookBtn" class="btn btn-light btn-custom w-100">Aggiungi Nuovo Libro</button>
  <button id="logoutBtn" class="btn btn-danger btn-custom w-100 mt-3">Logout</button>
</div>

<!-- ADD BOOK -->
<div id="addBookCard" class="glass-card text-center d-none" style="width:400px;">
  <h4 class="fw-bold mb-3">📖 Aggiungi Nuovo Libro</h4>
  <button id="scannerBtn" class="btn btn-light btn-custom w-100 mt-2">📷 Scanner ISBN</button>
  <input type="text" id="manualISBN_add" class="form-control mt-2 mb-2" placeholder="Digita ISBN">
  <button id="manualBtn" class="btn btn-secondary btn-custom w-100 mb-2">Cerca ISBN</button>
  <input type="text" id="titleAuthorSearch_add" class="form-control mt-2 mb-2" placeholder="Titolo o Autore">
  <button id="searchBtn" class="btn btn-secondary btn-custom w-100 mb-3">Cerca Libro</button>
  <div id="bookResults"></div>
  <div id="reader_add" class="d-none"></div>
  <div id="bookInfo" class="mt-3 d-none">
    <h5 id="bookTitle"></h5>
    <p id="bookAuthor"></p>
    <textarea id="bookDescription" class="form-control mb-2" placeholder="Descrizione (opzionale)"></textarea>
    <input type="text" id="bookCover" class="form-control mb-2" placeholder="URL Copertina (opzionale)">
    <select id="bookCategory" class="form-control mb-2">
      <option value="">Seleziona lista</option>
      <option value="to-read">Libri Da Leggere</option>
      <option value="reading">Libri In Lettura</option>
      <option value="read">Libri LettI</option>
    </select>
    <input type="date" id="startDate" class="form-control mb-2">
    <input type="date" id="endDate" class="form-control mb-2 d-none">
    <button id="saveBookBtn" class="btn btn-success btn-custom w-100">Salva Libro</button>
  </div>
  <button id="backBtn" class="btn btn-danger btn-custom mt-3 w-100">Indietro</button>
</div>

<!-- BOOK COLUMNS -->
<div id="bookColumns" class="columns d-none">
  <div class="column" id="to-read" ondragover="allowDrop(event)" ondrop="dropBook(event,'to-read')">
    <h5>📖 Da Leggere</h5>
  </div>
  <div class="column" id="reading" ondragover="allowDrop(event)" ondrop="dropBook(event,'reading')">
    <h5>📚 In Lettura</h5>
  </div>
  <div class="column" id="read" ondragover="allowDrop(event)" ondrop="dropBook(event,'read')">
    <h5>✅ LettI</h5>
  </div>
</div>

<!-- MODALE DETTAGLIO LIBRO -->
<div class="modal fade" id="bookDetailModal" tabindex="-1" aria-labelledby="bookDetailLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content text-dark">
      <div class="modal-header">
        <h5 class="modal-title" id="bookDetailLabel">Dettaglio Libro</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
      </div>
      <div class="modal-body">
        <div class="text-center mb-3">
          <img id="detailCover" src="" alt="Copertina" class="img-fluid rounded">
        </div>
        <h4 id="detailTitle" class="fw-bold"></h4>
        <p id="detailAuthor" class="fst-italic"></p>
        <p id="detailDescription"></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Chiudi</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
// --- FIREBASE ---
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAgObxcbvQfmbDrTkD8c1qE-iyxIwwDDmM",
  authDomain: "libreria-24a25.firebaseapp.com",
  projectId: "libreria-24a25",
  storageBucket: "libreria-24a25.firebasestorage.app",
  messagingSenderId: "176468553745",
  appId: "1:176468553745:web:e22ee006840027fd2e41b0",
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// --- DOM ---
const authCard=document.getElementById("authCard");
const dashboard=document.getElementById("dashboard");
const addBookCard=document.getElementById("addBookCard");
const bookColumns=document.getElementById("bookColumns");
const welcomeName=document.getElementById("welcomeName");
const bookResults=document.getElementById("bookResults");
const bookInfoDiv=document.getElementById("bookInfo");

// --- GLOBAL FUNCTIONS ---
window.emailVal = ()=>document.getElementById("email").value;
window.passVal = ()=>document.getElementById("password").value;

window.login = async function(){
  try { await signInWithEmailAndPassword(auth,emailVal(),passVal()); } 
  catch(e){ alert(e.message); }
};

window.register = async function(){
  const nome=document.getElementById("nome").value;
  const genere=document.getElementById("genere").value;
  if(!nome||!genere){alert("Compila tutti i campi"); return;}
  try{
    const userCredential = await createUserWithEmailAndPassword(auth,emailVal(),passVal());
    await setDoc(doc(db,"utenti",userCredential.user.uid),{nome,genere,email:emailVal(),dataCreazione:new Date()});
  }catch(e){alert(e.message);}
};

window.resetPassword = async function(){
  try{ await sendPasswordResetEmail(auth,emailVal()); alert("Email inviata"); }
  catch(e){ alert(e.message); }
};

window.logout = async function(){
  await signOut(auth);
  authCard.classList.remove("d-none");
  dashboard.classList.add("d-none");
  bookColumns.classList.add("d-none");
  bookColumns.innerHTML = `
    <div class="column" id="to-read"><h5>📖 Da Leggere</h5></div>
    <div class="column" id="reading"><h5>📚 In Lettura</h5></div>
    <div class="column" id="read"><h5>✅ LettI</h5></div>`;
};

// --- GOOGLE BOOKS SEARCH ---
window.manualISBN = async function() {
  const isbn = document.getElementById("manualISBN_add").value.trim();
  if(!isbn) { alert("Inserisci un ISBN"); return; }
  try{
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
    const data = await res.json();
    if(data.totalItems===0) { alert("Nessun libro trovato"); return; }
    fillBookInfo(data.items[0].volumeInfo);
  } catch(e){ console.error(e); alert("Errore nella ricerca ISBN"); }
};

window.searchTitleAuthor = async function() {
  const query = document.getElementById("titleAuthorSearch_add").value.trim();
  if(!query){ alert("Inserisci titolo o autore"); return; }
  try{
    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}`);
    const data = await res.json();
    bookResults.innerHTML="";
    if(data.totalItems===0){ bookResults.innerHTML="<p>Nessun risultato</p>"; return; }
    data.items.forEach(item=>{
      const info = item.volumeInfo;
      const btn = document.createElement("button");
      btn.className="btn btn-outline-light mb-1 w-100";
      btn.textContent = info.title + " – " + (info.authors ? info.authors.join(", ") : "Autore sconosciuto");
      btn.onclick = ()=>fillBookInfo(info);
      bookResults.appendChild(btn);
    });
  } catch(e){ console.error(e); alert("Errore nella ricerca"); }
};

function fillBookInfo(book){
  bookInfoDiv.classList.remove("d-none");
  document.getElementById("bookTitle").textContent = book.title || "";
  document.getElementById("bookAuthor").textContent = book.authors ? book.authors.join(", ") : "";
  document.getElementById("bookDescription").value = book.description || "";
  document.getElementById("bookCover").value = book.imageLinks?.thumbnail || "";
}

// --- AUTH STATE & DOM EVENTS ---
onAuthStateChanged(auth, user=>{
  if(user){
    welcomeName.textContent = "Benvenuto/a!";
    authCard.classList.add("d-none");
    dashboard.classList.remove("d-none");
    bookColumns.classList.remove("d-none");
  } else{
    authCard.classList.remove("d-none");
    dashboard.classList.add("d-none");
    bookColumns.classList.add("d-none");
  }
});

document.addEventListener('DOMContentLoaded', ()=>{
  // Tab login/register
  document.getElementById("loginTab").addEventListener('click', ()=>{
    document.getElementById("nome").classList.add("d-none");
    document.getElementById("genere").classList.add("d-none");
    document.getElementById("mainButton").textContent="Accedi";
    document.getElementById("mainButton").onclick = window.login;
  });
  document.getElementById("registerTab").addEventListener('click', ()=>{
    document.getElementById("nome").classList.remove("d-none");
    document.getElementById("genere").classList.remove("d-none");
    document.getElementById("mainButton").textContent="Registrati";
    document.getElementById("mainButton").onclick = window.register;
  });
  document.getElementById("forgotPassword").addEventListener('click', window.resetPassword);
  document.getElementById("addBookBtn").addEventListener('click', ()=>{
    dashboard.classList.add('d-none');
    addBookCard.classList.remove('d-none');
  });
  document.getElementById("backBtn").addEventListener('click', ()=>{
    addBookCard.classList.add('d-none');
    dashboard.classList.remove('d-none');
  });
  document.getElementById("manualBtn").addEventListener('click', window.manualISBN);
  document.getElementById("searchBtn").addEventListener('click', window.searchTitleAuthor);
  document.getElementById("logoutBtn").addEventListener('click', window.logout);
});

</script>
</body>
</html>
